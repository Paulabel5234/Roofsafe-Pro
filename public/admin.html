<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — RoofSafe Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- NAV -->
  <nav class="bg-blue-900 text-white">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-xl">🏗️</span>
        <span class="font-bold">RoofSafe Pro <span class="bg-blue-700 text-xs px-2 py-0.5 rounded ml-1">Admin</span></span>
      </div>
      <button id="adminLogoutBtn" class="hidden text-sm text-blue-300 hover:text-white transition">Logout</button>
    </div>
  </nav>

  <!-- LOGIN -->
  <div id="adminLogin" class="max-w-sm mx-auto px-4 py-16">
    <div class="bg-white rounded-2xl shadow p-8">
      <h1 class="text-xl font-bold text-blue-900 mb-6">Admin Login</h1>
      <div id="adminLoginError" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-xl p-3 mb-4 text-sm"></div>
      <form id="adminLoginForm" class="space-y-4">
        <input type="email" id="adminEmail" placeholder="Admin email" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <input type="password" id="adminPass" placeholder="Password" required
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-xl">Login</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="adminDash" class="hidden max-w-7xl mx-auto px-4 py-8">

    <!-- Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="statsRow"></div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6 flex-wrap">
      <button onclick="showTab('subscribers')" data-tab="subscribers" class="tab-btn active-tab px-4 py-2 rounded-lg font-medium text-sm">Subscribers</button>
      <button onclick="showTab('topics')" data-tab="topics" class="tab-btn px-4 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700">Toolbox Topics</button>
      <button onclick="showTab('emails')" data-tab="emails" class="tab-btn px-4 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700">Email Log</button>
    </div>

    <!-- Subscribers Tab -->
    <div id="tabSubscribers" class="tab-content">
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="p-4 border-b flex items-center justify-between">
          <h2 class="font-bold text-blue-900">All Subscribers</h2>
          <input type="text" id="searchInput" placeholder="Search by company or email..." class="border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 w-64" oninput="filterSubscribers()" />
        </div>
        <div id="subscriberTable" class="overflow-x-auto"></div>
      </div>
    </div>

    <!-- Topics Tab -->
    <div id="tabTopics" class="tab-content hidden">
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="p-4 border-b flex items-center justify-between">
          <h2 class="font-bold text-blue-900">Toolbox Topics</h2>
          <button onclick="runScheduleNow()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">▶ Run Schedule Now</button>
        </div>
        <div id="topicsTable" class="overflow-x-auto"></div>
      </div>
    </div>

    <!-- Email Log Tab -->
    <div id="tabEmails" class="tab-content hidden">
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="p-4 border-b">
          <h2 class="font-bold text-blue-900">Email Delivery Log</h2>
        </div>
        <div id="emailTable" class="overflow-x-auto"></div>
      </div>
    </div>

  </div>

  <!-- Subscriber Detail Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 text-2xl">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const API = '';
    let adminToken = localStorage.getItem('rsp_admin_token');
    let allSubscribers = [];

    if (adminToken) loadDash();

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('adminLoginError');
      errEl.classList.add('hidden');
      try {
        const res = await fetch(API + '/api/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('adminEmail').value, password: document.getElementById('adminPass').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        adminToken = data.token;
        localStorage.setItem('rsp_admin_token', adminToken);
        loadDash();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });

    async function adminFetch(url, opts = {}) {
      return fetch(API + url, { ...opts, headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + adminToken, ...(opts.headers || {}) } });
    }

    async function loadDash() {
      document.getElementById('adminLogin').classList.add('hidden');
      document.getElementById('adminDash').classList.remove('hidden');
      document.getElementById('adminLogoutBtn').classList.remove('hidden');
      await Promise.all([loadStats(), loadSubscribers(), loadTopics(), loadEmails()]);
    }

    async function loadStats() {
      const res = await adminFetch('/api/admin/stats');
      const s = await res.json();
      document.getElementById('statsRow').innerHTML = [
        ['Active', s.active, '✅'],
        ['Total', s.total_contractors, '👥'],
        ['Emails Sent', s.total_emails_sent, '📬'],
        ['Topics', s.toolbox_topics_count, '📋'],
      ].map(([l, v, ic]) => `<div class="bg-white rounded-xl p-4 shadow-sm text-center"><div class="text-3xl font-extrabold text-blue-700">${v}</div><div class="text-xs text-gray-500 mt-1">${ic} ${l}</div></div>`).join('');
    }

    async function loadSubscribers() {
      const res = await adminFetch('/api/admin/subscribers');
      allSubscribers = await res.json();
      renderSubscribers(allSubscribers);
    }

    function filterSubscribers() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderSubscribers(allSubscribers.filter(c => c.company_name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q)));
    }

    function renderSubscribers(contractors) {
      const statusColor = { active: 'bg-green-100 text-green-700', pending: 'bg-yellow-100 text-yellow-700', cancelled: 'bg-red-100 text-red-700', suspended: 'bg-gray-100 text-gray-700' };
      document.getElementById('subscriberTable').innerHTML = contractors.length === 0 ? '<p class="p-6 text-gray-400 text-center">No subscribers yet.</p>' : `
        <table class="w-full text-sm min-w-[600px]">
          <thead><tr class="bg-gray-50 border-b text-xs text-gray-500 uppercase">
            <th class="px-4 py-3 text-left">Company</th>
            <th class="px-4 py-3 text-left">Email</th>
            <th class="px-4 py-3 text-left">Status</th>
            <th class="px-4 py-3 text-left">Topics Sent</th>
            <th class="px-4 py-3 text-left">Activated</th>
            <th class="px-4 py-3 text-left">Actions</th>
          </tr></thead>
          <tbody>
            ${contractors.map(c => `
              <tr class="border-b hover:bg-gray-50 cursor-pointer" onclick="viewSubscriber(${c.id})">
                <td class="px-4 py-3 font-medium text-gray-900">${c.company_name}</td>
                <td class="px-4 py-3 text-gray-600">${c.email}</td>
                <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusColor[c.status] || 'bg-gray-100 text-gray-600'}">${c.status}</span></td>
                <td class="px-4 py-3 text-gray-600">${c.topics_sent}</td>
                <td class="px-4 py-3 text-gray-500">${c.activation_date ? new Date(c.activation_date).toLocaleDateString() : '—'}</td>
                <td class="px-4 py-3">
                  <button onclick="event.stopPropagation(); sendTopic(${c.id}, '${c.company_name}')" class="text-xs text-blue-600 hover:underline mr-3">Send Topic</button>
                  <button onclick="event.stopPropagation(); changeStatus(${c.id})" class="text-xs text-gray-500 hover:underline">Change Status</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function viewSubscriber(id) {
      const res = await adminFetch(`/api/admin/subscribers/${id}`);
      const c = await res.json();
      const statusColor = { active: 'bg-green-100 text-green-700', pending: 'bg-yellow-100 text-yellow-700', cancelled: 'bg-red-100 text-red-700', suspended: 'bg-gray-100 text-gray-700' };
      document.getElementById('modalContent').innerHTML = `
        <h2 class="text-xl font-bold text-blue-900 mb-1">${c.company_name}</h2>
        <span class="inline-block px-2 py-1 rounded-full text-xs font-semibold ${statusColor[c.status] || ''} mb-4">${c.status}</span>
        <div class="grid sm:grid-cols-2 gap-2 text-sm text-gray-700 mb-6">
          ${[['Email', c.email], ['Phone', c.phone], ['Address', c.address], ['City/State/ZIP', c.city_state_zip], ['CSLB #', c.cslb_license], ['IIPP Admin', c.iipp_admin], ['Stripe Customer', c.stripe_customer_id], ['Activated', c.activation_date ? new Date(c.activation_date).toLocaleDateString() : '—']].map(([k,v]) => v ? `<div><span class="font-semibold">${k}:</span> ${v}</div>` : '').join('')}
        </div>
        <h3 class="font-bold text-gray-700 mb-2 text-sm">Delivery History (${c.deliveries?.length || 0})</h3>
        ${c.deliveries?.length ? `
          <table class="w-full text-xs border-collapse">
            <thead><tr class="bg-gray-50"><th class="border px-2 py-1 text-left">Date</th><th class="border px-2 py-1 text-left">Topic</th><th class="border px-2 py-1">Status</th></tr></thead>
            <tbody>${c.deliveries.map(d => `<tr><td class="border px-2 py-1">${new Date(d.sent_at || d.created_at).toLocaleDateString()}</td><td class="border px-2 py-1">${d.topic_title ? `#${d.topic_number}: ${d.topic_title}` : d.subject}</td><td class="border px-2 py-1 text-center">${d.status}</td></tr>`).join('')}</tbody>
          </table>
        ` : '<p class="text-gray-400 text-sm">No deliveries yet.</p>'}
      `;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function sendTopic(contractorId, name) {
      if (!confirm(`Send next toolbox topic to ${name}?`)) return;
      const res = await adminFetch(`/api/admin/send-topic/${contractorId}`, { method: 'POST' });
      const data = await res.json();
      alert(data.success ? '✅ Topic sent!' : `❌ Failed: ${data.error}`);
      loadSubscribers();
      loadEmails();
    }

    async function changeStatus(id) {
      const status = prompt('New status (active, pending, cancelled, suspended):');
      if (!status) return;
      const res = await adminFetch(`/api/admin/subscribers/${id}/status`, {
        method: 'PATCH',
        body: JSON.stringify({ status }),
      });
      if (res.ok) { loadSubscribers(); loadStats(); }
    }

    async function runScheduleNow() {
      if (!confirm('Run the full schedule now? This will send topics to all subscribers who are due.')) return;
      const res = await adminFetch('/api/admin/run-schedule', { method: 'POST' });
      const data = await res.json();
      alert(data.success ? '✅ Schedule completed!' : `❌ ${data.error}`);
      loadEmails();
    }

    async function loadTopics() {
      const res = await adminFetch('/api/admin/topics');
      const topics = await res.json();
      const byCategory = {};
      topics.forEach(t => { (byCategory[t.category] = byCategory[t.category] || []).push(t); });
      document.getElementById('topicsTable').innerHTML = `
        <table class="w-full text-sm min-w-[500px]">
          <thead><tr class="bg-gray-50 border-b text-xs text-gray-500 uppercase">
            <th class="px-4 py-3 text-left">#</th>
            <th class="px-4 py-3 text-left">Title</th>
            <th class="px-4 py-3 text-left">Category</th>
            <th class="px-4 py-3 text-left">File</th>
            <th class="px-4 py-3 text-left">Active</th>
          </tr></thead>
          <tbody>
            ${topics.map(t => `
              <tr class="border-b hover:bg-gray-50">
                <td class="px-4 py-3 font-bold text-blue-700">${t.topic_number}</td>
                <td class="px-4 py-3 text-gray-800">${t.title}</td>
                <td class="px-4 py-3 text-gray-500 text-xs">${t.category}</td>
                <td class="px-4 py-3 text-gray-400 text-xs font-mono">${t.filename}</td>
                <td class="px-4 py-3"><span class="${t.active ? 'text-green-600' : 'text-gray-400'}">${t.active ? '✅' : '—'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function loadEmails() {
      const res = await adminFetch('/api/admin/deliveries');
      const emails = await res.json();
      document.getElementById('emailTable').innerHTML = emails.length === 0 ? '<p class="p-6 text-gray-400 text-center">No emails sent yet.</p>' : `
        <table class="w-full text-sm min-w-[600px]">
          <thead><tr class="bg-gray-50 border-b text-xs text-gray-500 uppercase">
            <th class="px-4 py-3 text-left">Date</th>
            <th class="px-4 py-3 text-left">Company</th>
            <th class="px-4 py-3 text-left">Email</th>
            <th class="px-4 py-3 text-left">Subject</th>
            <th class="px-4 py-3 text-left">Status</th>
          </tr></thead>
          <tbody>
            ${emails.map(e => `
              <tr class="border-b hover:bg-gray-50">
                <td class="px-4 py-3 text-gray-500">${new Date(e.sent_at || e.created_at).toLocaleDateString()}</td>
                <td class="px-4 py-3 font-medium text-gray-800">${e.company_name}</td>
                <td class="px-4 py-3 text-gray-500 text-xs">${e.contractor_email}</td>
                <td class="px-4 py-3 text-gray-700">${e.subject || e.email_type}</td>
                <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${e.status === 'sent' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${e.status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(el => el.className = 'tab-btn px-4 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700');
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');
      document.querySelector(`[data-tab="${tab}"]`).className = 'tab-btn active-tab px-4 py-2 rounded-lg font-medium text-sm bg-blue-700 text-white';
    }

    document.getElementById('adminLogoutBtn').addEventListener('click', () => {
      localStorage.removeItem('rsp_admin_token');
      window.location.reload();
    });
  </script>
</body>
</html>
